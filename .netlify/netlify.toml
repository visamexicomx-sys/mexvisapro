[functions]

[functions."*"]

[[plugins]]
origin = "config"
package = "@netlify/plugin-lighthouse"

[plugins.inputs]

[build]
publish = "/home/olek/immigration-site"
publishOrigin = "config"

[build.environment]

[build.processing]
skip_processing = false

[build.processing.css]
bundle = true
minify = true

[build.processing.html]
pretty_urls = true

[build.processing.images]
compress = true

[build.processing.js]
bundle = true
minify = true

[build.services]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://www.google-analytics.com https://www.googletagmanager.com; connect-src 'self' https://www.google-analytics.com https://analytics.google.com"
Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
X-DNS-Prefetch-Control = "on"
Cross-Origin-Opener-Policy = "same-origin"
Cross-Origin-Resource-Policy = "cross-origin"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/assets/img/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/en/*"

[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=86400"
Vary = "Accept-Language"

[[headers]]
for = "/es/*"

[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=86400"
Vary = "Accept-Language"

[[headers]]
for = "/ru/*"

[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=86400"
Vary = "Accept-Language"

[[headers]]
for = "/zh/*"

[headers.values]
Cache-Control = "public, max-age=3600, s-maxage=86400"
Vary = "Accept-Language"

[[headers]]
for = "/sitemap.xml"

[headers.values]
Cache-Control = "public, max-age=3600"
Content-Type = "application/xml"

[[headers]]
for = "/robots.txt"

[headers.values]
Cache-Control = "public, max-age=86400"

[[redirects]]
from = "https://www.mexvisapro.com/*"
to = "https://mexvisapro.com/:splat"
status = 301.0
force = true

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/en"
to = "/en/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/es"
to = "/es/index.html"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/ru"
to = "/ru/index.html"
status = 200.0
force = false

[redirects.query]

