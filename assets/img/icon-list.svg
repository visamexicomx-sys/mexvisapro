  <rect x="25" y="20" width="55" height="65" rx="6" fill="#fff" fill-opacity=".25"/>
  <!-- Numbered list -->
  <g font-family="Inter,sans-serif" font-size="9" font-weight="700" fill="#fff" fill-opacity=".4">
    <text x="33" y="40">1.</text>
    <text x="33" y="53">2.</text>
