<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Calculator -->
  <rect x="30" y="22" width="55" height="70" rx="8" fill="#fff" fill-opacity=".2"/>
  <!-- Screen -->
  <rect x="37" y="30" width="41" height="16" rx="4" fill="#fff" fill-opacity=".15"/>
  <text x="72" y="43" text-anchor="end" font-family="Inter,sans-serif" font-size="10" font-weight="700" fill="#fff" fill-opacity=".35">RFC</text>
  <!-- Buttons -->
  <g fill="#fff" fill-opacity=".15">
    <rect x="37" y="52" width="10" height="8" rx="2"/>
    <rect x="52" y="52" width="10" height="8" rx="2"/>
    <rect x="67" y="52" width="10" height="8" rx="2"/>
    <rect x="37" y="65" width="10" height="8" rx="2"/>
    <rect x="52" y="65" width="10" height="8" rx="2"/>
    <rect x="67" y="65" width="10" height="8" rx="2"/>
    <rect x="37" y="78" width="25" height="8" rx="2"/>
    <rect x="67" y="78" width="10" height="8" rx="2"/>
  </g>
  <!-- Coin -->
  <g transform="translate(78, 18)">
    <circle r="16" fill="#fff" fill-opacity=".2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="800" fill="#fff" fill-opacity=".3">$</text>
  </g>
</svg>
