<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- ID Card -->
  <rect x="18" y="30" width="84" height="55" rx="8" fill="#fff" fill-opacity=".2"/>
  <!-- Photo -->
  <rect x="26" y="40" width="28" height="32" rx="5" fill="#fff" fill-opacity=".15"/>
  <circle cx="40" cy="50" r="8" fill="#fff" fill-opacity=".12"/>
  <path d="M28 68 Q40 58 52 68Z" fill="#fff" fill-opacity=".12"/>
  <!-- Info lines -->
  <rect x="62" y="42" width="32" height="4" rx="2" fill="#fff" fill-opacity=".25"/>
  <rect x="62" y="52" width="24" height="3" rx="1.5" fill="#fff" fill-opacity=".18"/>
  <rect x="62" y="60" width="28" height="3" rx="1.5" fill="#fff" fill-opacity=".15"/>
  <!-- CURP label -->
  <rect x="26" y="75" width="35" height="6" rx="3" fill="#fff" fill-opacity=".15"/>
  <text x="43" y="80" text-anchor="middle" font-family="Inter,sans-serif" font-size="5" font-weight="700" fill="#fff" fill-opacity=".4">CURP</text>
  <!-- Barcode -->
  <g transform="translate(65, 74)" opacity=".2">
    <rect width="1.5" height="8" fill="#fff"/><rect x="3" width="1" height="8" fill="#fff"/>
    <rect x="5.5" width="2" height="8" fill="#fff"/><rect x="9" width="1" height="8" fill="#fff"/>
    <rect x="11.5" width="1.5" height="8" fill="#fff"/><rect x="14.5" width="1" height="8" fill="#fff"/>
    <rect x="17" width="2" height="8" fill="#fff"/><rect x="20.5" width="1.5" height="8" fill="#fff"/>
  </g>
  <!-- Fingerprint -->
  <g transform="translate(55, 90)" opacity=".2" stroke="#fff" stroke-width="1" fill="none">
    <path d="M5 12 Q5 2 12 2 Q19 2 19 12"/>
    <path d="M7 12 Q7 4 12 4 Q17 4 17 12"/>
    <path d="M9 12 Q9 6 12 6 Q15 6 15 12"/>
    <path d="M11 12 L11 8 Q12 8 13 8 L13 12"/>
  </g>
</svg>
